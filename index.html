<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | Saif Ali</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 20px;
      background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
      color: #333; text-align: center; transition: all 0.5s ease;
    }
    .profile-card {
      background-color: white; max-width: 650px; margin: 40px auto;
      padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: all 0.5s ease;
    }
    .profile-img { max-width: 100%; border-radius: 15px; margin-bottom: 25px; }
    h1 { color: #006064; margin-top: 0; font-size: 2.5em; }
    h2 { color: #00838f; border-bottom: 2px solid #b2ebf2; display: inline-block; padding-bottom: 5px; }
    .project-section {
      background-color: #f1f8f9; padding: 25px; border-radius: 15px; 
      margin: 30px 0; text-align: left; border: 1px solid #cceef3; transition: all 0.5s ease;
    }
    .btn {
      display: inline-block; background-color: #00796b; color: white; border: none; cursor: pointer;
      padding: 15px 30px; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 16px;
    }
    #theme-btn {
      background-color: #333; color: white; border: none; padding: 10px 20px;
      border-radius: 20px; cursor: pointer; font-size: 14px; position: absolute; 
      top: 20px; right: 20px; font-weight: bold;
    }

    /* DARK MODE STYLES */
    body.dark-theme { background: linear-gradient(135deg, #121212 0%, #2c3e50 100%); color: #e0e0e0; }
    body.dark-theme .profile-card { background-color: #1e1e1e; }
    body.dark-theme .project-section { background-color: #263238; border-color: #37474f; }
    body.dark-theme h1 { color: #80deea; }
    body.dark-theme h2 { color: #4dd0e1; }
  </style>
</head>
<body>

  <button id="theme-btn" onclick="toggleTheme()">🌙 Dark Mode</button>

  <div class="profile-card">
    <h1>Hello, I am Saif Ali!</h1>
    
    <div class="project-section" style="text-align: center;">
      <h2 style="margin-top: 0;">🎮 Number Guessing Game</h2>
      <p>Maine 1 se 20 ke beech ek number socha hai. Guess karein!</p>
      
      <input type="number" id="guessInput" placeholder="1-20" style="padding: 10px; border-radius: 8px; width: 50%; border: 1px solid #ccc;">
      <br><br>
      <button onclick="checkGuess()" class="btn" style="background-color: #ff9800; width: 60%;">Guess Karo! 🎯</button>
      
      <p id="gameResult" style="font-weight: bold; margin-top: 20px; min-height: 25px;"></p>
    </div>

    <div class="project-section">
      <h2 style="margin-top:0">Contact Me</h2>
      <form action="https://formspree.io/f/mzdkbwaj" method="POST" style="display: flex; flex-direction: column; gap: 10px;">
        <input type="text" name="name" placeholder="Your Name" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <input type="email" name="email" placeholder="Your Email" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <textarea name="message" placeholder="Message" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
        <button type="submit" class="btn">Send Message 🚀</button>
      </form>
    </div>
  </div>

  <script>
    // Theme Toggle
    function toggleTheme() {
      document.body.classList.toggle("dark-theme");
      let btn = document.getElementById("theme-btn");
      btn.innerHTML = document.body.classList.contains("dark-theme") ? "☀️ Light Mode" : "🌙 Dark Mode";
    }

    // Game Logic
    let secretNumber = Math.floor(Math.random() * 20) + 1;
    let attempts = 0;

    function checkGuess() {
      let userGuess = parseInt(document.getElementById("guessInput").value);
      let resultText = document.getElementById("gameResult");
      attempts++;

      if (userGuess === secretNumber) {
        resultText.innerHTML = "🎉 BINGO! Aapne " + attempts + " koshishon mein jeet liya!";
        resultText.style.color = "green";
        
        // Patakhe phodo!
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        // Naya number socho agle game ke liye
        secretNumber = Math.floor(Math.random() * 20) + 1;
        attempts = 0;
      } 
      else if (userGuess < secretNumber) {
        resultText.innerHTML = "Bada number sochiye! ⬆️";
        resultText.style.color = "#d35400";
      } 
      else {
        resultText.innerHTML = "Chhota number sochiye! ⬇️";
        resultText.style.color = "#d35400";
      }
    }
  </script>
</body>
</html>
